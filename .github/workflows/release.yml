name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
          - os: macos-13
            target: x86_64-apple-darwin
            archive_ext: tar.gz
          - os: macos-14
            target: aarch64-apple-darwin
            archive_ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            archive_ext: zip
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build release binary
        run: cargo build --release --features cli --target ${{ matrix.target }}

      - name: Package Unix artifact
        if: matrix.archive_ext == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          asset="mempalace-${version}-${{ matrix.target }}"
          mkdir -p "dist/${asset}"
          cp "target/${{ matrix.target }}/release/mempalace" "dist/${asset}/"
          strip "dist/${asset}/mempalace" || true
          cp README.md LICENSE "dist/${asset}/"
          tar -C dist -czf "dist/${asset}.tar.gz" "${asset}"

      - name: Package Windows artifact
        if: matrix.archive_ext == 'zip'
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME.TrimStart("v")
          $asset = "mempalace-$version-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path "dist/$asset" | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/mempalace.exe" "dist/$asset/"
          Copy-Item README.md,LICENSE "dist/$asset/"
          Compress-Archive -Path "dist/$asset/*" -DestinationPath "dist/$asset.zip"

      - name: Generate checksum
        shell: bash
        run: |
          cd dist
          if [[ "${{ matrix.archive_ext }}" == "zip" ]]; then
            shasum -a 256 mempalace-*-${{ matrix.target }}.zip > mempalace-${{ matrix.target }}.sha256
          else
            shasum -a 256 mempalace-*-${{ matrix.target }}.tar.gz > mempalace-${{ matrix.target }}.sha256
          fi

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/mempalace-*-${{ matrix.target }}.${{ matrix.archive_ext }}
            dist/mempalace-${{ matrix.target }}.sha256

  publish-dry-run:
    name: Cargo publish dry run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cargo publish dry run
        run: cargo publish --dry-run
